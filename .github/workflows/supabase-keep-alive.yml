name: Supabase Keep Alive

on:
  # Runs every 3 days at 00:00 UTC
  schedule:
  - cron: '0 0 */3 * *'
  # Allows manual trigger from the Actions tab
  workflow_dispatch:


jobs:
  ping:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
    - name: Ping Supabase REST API
      env:
        SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL }}
        SUPABASE_KEY: ${{ secrets.VITE_SUPABASE_SERVICE_ROLE_KEY }}
      run: |
        if [ -z "$SUPABASE_URL" ] || [ -z "$SUPABASE_KEY" ]; then
          echo "❌ SUPABASE_URL or SUPABASE_KEY secret is not set"
          exit 1
        fi

        echo "🔄 Pinging Supabase API..."

        curl -X GET "${SUPABASE_URL}/rest/v1/" \
          -H "apikey: ${SUPABASE_KEY}" \
          -H "Authorization: Bearer ${SUPABASE_KEY}" \
          -H "Content-Type: application/json" \
          -I --fail --silent --show-error || {
            echo "❌ Failed to ping Supabase API"
            exit 1
          }

        echo "✅ Supabase API pinged successfully"
